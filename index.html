<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Explore Tailwind</title>
</head>
<body>
   <header class="mx-auto my-12.5 max-w-292.5">
        <nav>
            <div class="flex justify-between items-center">
                <h3 class="font-[garamond] font-extrabold text-[35px] text-[#414040]"> <i class="fa-solid fa-gavel text-[#b5804f]"></i> Justice</h3>
                <div>
                    <ul class="flex gap-7.5 poppins-font text-[#707070] rounded-lg">
                        <li>Home</li>
                        <li>Services</li>
                        <li>Cases</li>
                        <li>Blog</li>
                        <li>Contact Us</li>
                    </ul>
                </div>
                <button class="poppins-font bg-[#B68C5A] py-4.5 px-7.25 text-white rounded-lg text-l font-semibold">Free Consultation</button>
            </div>
        </nav>
        <section class="relative overflow-hidden bg-[url(/images/banner.png)] bg-cover bg-center  py-26 mt-12.5 rounded-lg  ">
            <div class="absolute inset-0 bg-linear-to-t from-black/80 to-transparent"></div>
            <div class="max-w-173 mx-auto relative z-10">
                <p class="font-[garamond] font-extrabold text-white text-center text-7xl">We Provide Effective Legal Solutions</p>
                <p class="text-[#E7E7E7] text-center mt-6 mb-8">There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour.</p>
            <div class="mx-auto flex justify-center gap-x-6">
                <input class="bg-white w-125 py-4.75 pl-5 rounded-lg"  type="text" placeholder="Search your services" >
                <button class="poppins-font bg-[#B68C5A] py-4.25 px-10 text-white rounded-lg text-xl font-semibold">Search</button>
            </div>
            </div>
           
        </section>
   </header>
</body>
</html>
